<!-- Used by theme-projects-builtin-1a, entire card is the link. -->

<style>
  .imagesize {
    height: 226px;
    width: 362px;
  }
</style>

<a class="card" style="background-color: #fbbd08" href="{{ site.baseurl}}{{ include.page.url }}">
    {% if include.page.image %}
      <div class="blurring dimmable image" style="height: 200px; width: 100%;">
        <div class = "ui dimmer">
          <div class = "content">
            
            <h2>{{include.page.summary}}</h2>
              <!-- {% if page.projecturl %}
                <a class="ui center" href="{{ page.projecturl }}"><h2>{{include.page.summary}}</h2></a>
              {% else %}
                <a class="ui center" href="{{ site.baseurl}}{{ include.page.url }}"><h4>{{include.page.summary}}</h4></a>
              {% endif %}    -->
     
          </div>
        </div>
        <img src="{{ site.baseurl }}/{{ include.page.image }}" style="height: 200px; width: 100%;">
      </div>
    {% endif %}
   <div class="content" style="display: flex; align-items: center; justify-content: center;">
    <span class="center aligned header" style="color: black; font-size: 24px;">{{ include.page.title }}</span>
  </div>
</a>
