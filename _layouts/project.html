---
layout: projects
---
<style>
  .project-background {
    background: url('../{{ page.backgroundImage }}') no-repeat center center fixed;
    background-size: cover;
  }

  .max-height {
    height: 1900px;
  }
</style>

<div style="padding-top: 14px; padding-bottom: 25px; width: 100%" class="ui container">
  <div class="column">
    <div style="color: whitesmoke">
        {{ content }}
    </div>
  </div>
</div>

<script type="text/javascript">
  /* Terrible ugly hack to get nice background image on main page without changing other templates */
  document.addEventListener("DOMContentLoaded", function() {
    var body = document.getElementsByTagName("body")[0];
    body.style.cssText =
        'background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("../{{ page.backgroundImage }}") center center fixed;' +
        'background-size: cover;' +
        'background-attachment: fixed;' +
        'background-color: black;' +
        'background-repeat: no-repeat;';
  });
</script>
